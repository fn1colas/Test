<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMI - Real Estate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>AMI</h1>
        <nav class="main-nav" id="nav">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul>
                <li><a href="#properties">Properties</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <h2>Your Modern Home Awaits</h2>
            <p>Minimalist real estate made simple.</p>
        </section>

        <section id="properties" class="properties">
            <h3>Featured Properties</h3>
            <div class="property-grid">
                <div class="property-card">
                    <img src="https://via.placeholder.com/300x200" alt="Property 1">
                    <h4>Modern Apartment</h4>
                    <p>2 bed, 2 bath in downtown.</p>
                </div>
                <div class="property-card">
                    <img src="https://via.placeholder.com/300x200" alt="Property 2">
                    <h4>Cozy House</h4>
                    <p>3 bed, 2 bath with garden.</p>
                </div>
                <div class="property-card">
                    <img src="https://via.placeholder.com/300x200" alt="Property 3">
                    <h4>Luxury Villa</h4>
                    <p>5 bed, 4 bath with pool.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2024 AMI Real Estate</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
